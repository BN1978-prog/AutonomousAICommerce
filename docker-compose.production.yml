services:
  postgres:
    image: postgres:16
    container_name: autonomous_commerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: commerce_db
      POSTGRES_USER: commerce_user
      POSTGRES_PASSWORD: commerce_password
    ports:
      - "5432:5432"
    volumes:
      - commerce_postgres_data:/var/lib/postgresql/data

volumes:
  commerce_postgres_data:
